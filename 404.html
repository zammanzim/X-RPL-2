<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Maintenance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #fafaf9;
      color: #1a1a1a;
      font-family: 'Arial', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .wrapper {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    /* Icon */
    .icon {
      width: 52px;
      height: 52px;
      margin: 0 auto 2rem;
      opacity: 0;
      animation: fadeUp 0.5s 0.1s ease forwards;
    }
    .icon svg {
      width: 100%;
      height: 100%;
      stroke: #1a1a1a;
    }

    /* 404 */
    .code {
      font-family: 'Playfair Display', serif;
      font-size: clamp(5rem, 16vw, 8rem);
      font-weight: 400;
      letter-spacing: -0.03em;
      color: #1a1a1a;
      line-height: 1;
      opacity: 0;
      animation: fadeUp 0.5s 0.2s ease forwards;
    }

    /* Divider */
    .divider {
      width: 32px;
      height: 1px;
      background: #d0cec9;
      margin: 1.75rem auto;
      opacity: 0;
      animation: fadeUp 0.5s 0.3s ease forwards;
    }

    h1 {
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: #1a1a1a;
      margin-bottom: 0.65rem;
      opacity: 0;
      animation: fadeUp 0.5s 0.35s ease forwards;
    }

    p {
      font-size: 0.875rem;
      font-weight: 300;
      color: #7a7470;
      line-height: 1.75;
      opacity: 0;
      animation: fadeUp 0.5s 0.4s ease forwards;
    }

    /* Status pill */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-top: 2rem;
      padding: 7px 14px;
      border: 1px solid #e5e2de;
      border-radius: 100px;
      font-size: 0.72rem;
      color: #7a7470;
      letter-spacing: 0.04em;
      opacity: 0;
      animation: fadeUp 0.5s 0.5s ease forwards;
    }
    .dot {
      width: 6px; height: 6px;
      background: #d4a853;
      border-radius: 50%;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Button */
    .btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 10px 24px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 400;
      color: #fafaf9;
      background: #1a1a1a;
      border-radius: 6px;
      text-decoration: none;
      transition: opacity 0.2s;
      opacity: 0;
      animation: fadeUp 0.5s 0.6s ease forwards;
    }
    .btn:hover { opacity: 0.75; }

    /* Footer */
    footer {
      position: fixed;
      bottom: 1.75rem;
      font-size: 0.7rem;
      color: #bfbbb7;
      letter-spacing: 0.03em;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="wrapper">

    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22C6.48 22 2 17.52 2 12S6.48 2 12 2s10 4.48 10 10-4.48 10-10 10z"/>
        <path d="M12 8v4M12 16h.01"/>
      </svg>
    </div>

    <div class="code">404</div>

    <div class="divider"></div>

    <h1>Web Is Under Maintenance</h1>

</body>
</html>
